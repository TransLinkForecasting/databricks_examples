resources:
  jobs:
    standard_serverless_python_job:
      name: standard_serverless_python_job
      tasks:
        - task_key: main
          spark_python_task:
            python_file: ../../src/main.py
          environment_key: default

      environments:
        - environment_key: default
          spec:
            environment_version: "4"
            dependencies:
              - -r ../../requirements/requirements-serverless.txt
